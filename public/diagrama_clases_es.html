
<div id="cls"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('cls-svg', `classDiagram
  class Usuario {
    +bigint id
    +string nombre
    +string correo
    +string contrasena
    +timestamp creado_en
    +demos() HasMany
    +obtenerAvatar() string
  }

  class Demo {
    +bigint id
    +bigint usuario_id
    +string nombre_archivo
    +string ruta
    +string estado
    +timestamp subido_en
    +usuario() BelongsTo
    +analisis() HasOne
    +estaPendiente() bool
    +estaProcesada() bool
  }

  class Analisis {
    +bigint id
    +bigint demo_id
    +json resultado_json
    +string nombre_mapa
    +int rondas_jugadas
    +int puntuacion_equipo1
    +int puntuacion_equipo2
    +timestamp analizado_en
    +demo() BelongsTo
    +obtenerGanador() string
  }

  class DemoControlador {
    +listar() View
    +guardar(Solicitud) RedirectResponse
    +mostrar(Demo) View
    +eliminar(Demo) RedirectResponse
  }

  class ServicioAnalisisJava {
    -string urlApiJava
    +enviarDemo(Demo) array
    +procesarRespuesta(array) Analisis
  }

  Usuario "1" --> "0..*" Demo : tiene muchas
  Demo "1" --> "0..1" Analisis : tiene uno
  DemoControlador --> Demo : usa
  DemoControlador --> ServicioAnalisisJava : llama
  ServicioAnalisisJava --> Analisis : crea
`);
document.getElementById('cls').innerHTML = svg;
</script>
